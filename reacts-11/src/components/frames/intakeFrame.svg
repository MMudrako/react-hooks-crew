<svg
  width="300"
  height="300"
  viewBox="0 0 300 300"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Subtle grain / paper texture -->
    <pattern id="grain" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="#e6e6e6" />
      <circle cx="10" cy="10" r="1" fill="#d2d2d2" />
      <circle cx="30" cy="20" r="1" fill="#cccccc" />
      <circle cx="20" cy="35" r="1" fill="#d8d8d8" />
    </pattern>

    <!-- Soft inner shadow illusion -->
    <linearGradient id="innerFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Outer frame -->
  <rect
    x="0"
    y="0"
    width="300"
    height="300"
    fill="url(#grain)"
  />

  <!-- Inner intake window -->
  <rect
    id="intake-window"
    x="50"
    y="40"
    width="200"
    height="200"
    fill="#f9f9f9"
    stroke="#b0b0b0"
    stroke-width="3"
    rx="4"
  />

  <!-- Inner shadow overlay -->
  <rect
    x="50"
    y="40"
    width="200"
    height="200"
    fill="url(#innerFade)"
    pointer-events="none"
  />

  <!-- Header bar (admission label area) -->
  <rect
    x="50"
    y="20"
    width="200"
    height="20"
    fill="#d4d4d4"
    stroke="#b0b0b0"
    stroke-width="2"
  />

  <!-- Tiny status indicators -->
  <circle cx="65" cy="30" r="3" fill="#9a9a9a" />
  <circle cx="75" cy="30" r="3" fill="#b0b0b0" />
  <circle cx="85" cy="30" r="3" fill="#c6c6c6" />

  <!-- Corner fasteners -->
  <circle cx="20" cy="20" r="4" fill="#b5b5b5" />
  <circle cx="280" cy="20" r="4" fill="#b5b5b5" />
  <circle cx="20" cy="280" r="4" fill="#b5b5b5" />
  <circle cx="280" cy="280" r="4" fill="#b5b5b5" />

  <!-- Optional stamp target -->
  <rect
    id="approval-stamp"
    x="190"
    y="190"
    width="80"
    height="30"
    rx="4"
    fill="none"
    stroke="#c0c0c0"
    stroke-dasharray="4 3"
  />
</svg>
